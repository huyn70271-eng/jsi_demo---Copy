<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - GUITARX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #e52e2d;
            --text-main: #333;
            --text-sub: #666;
            --bg-light: #f9f9f9;
            --border-color: #eee;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: #fff;
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Breadcrumb (Đường dẫn) */
        .breadcrumb {
            padding: 10px 0;
            font-size: 14px;
            color: var(--text-sub);
        }
        .breadcrumb a { text-decoration: none; color: var(--text-sub); }
        .breadcrumb a:hover { color: var(--primary-color); }

        /* Main Product Layout */
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        /* Cột trái: Hình ảnh */
        .product-image {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .product-image img {
            max-width: 100%;
            height: auto;
            transition: transform 0.3s;
        }

        /* Cột phải: Thông tin */
        .product-info h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #000;
        }

        .product-meta {
            margin-bottom: 20px;
            font-size: 15px;
        }
        .product-meta span { margin-right: 20px; }
        .product-meta strong { color: var(--primary-color); }

        .price-box {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 25px;
        }
        .current-price {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .product-desc-short {
            line-height: 1.6;
            color: var(--text-sub);
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        /* Nút hành động */
        .action-btns {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
        }
        .btn-buy { background: var(--primary-color); color: white; }
        .btn-cart { background: #333; color: white; }
        .btn:hover { opacity: 0.9; }

        /* Responsive */
        @media (max-width: 768px) {
            .product-detail { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">Trang chủ</a> / <span id="bread-type">Sản phẩm</span> / <span id="bread-name">Chi tiết</span>
        </div>

        <div id="product-content" class="product-detail">
            <div class="loading">Đang tải thông tin sản phẩm...</div>
        </div>
    </div>

    <script src="./detail.js"></script>
</body>
</html>
