<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - GUITARX</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="form">
        <div class="form-header">
            <a href="./index.html" class="back-link"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
        </div>

        <h1>ĐĂNG NHẬP</h1>

        <form id="loginForm">
            <div class="form-control">
                <label for="username">Tên đăng nhập</label>
                <input id="username" type="text" placeholder="Nhập tên đăng nhập" required autocomplete="username" />
            </div>
            <div class="form-control">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input id="password" type="password" placeholder="Nhập mật khẩu" required
                        autocomplete="current-password" />
                    <span id="togglePassword" class="toggle-password"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <p id="err"></p>
            <button type="submit" id="submitBtn">Đăng nhập</button>
        </form>
    </div>

    <script>
        let users = [];
        const url = "https://69b6a4f2583f543fbd9e31f3.mockapi.io/users/users";

        // Vô hiệu hóa nút submit cho đến khi tải xong dữ liệu
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.innerText = "Đang tải dữ liệu...";

        fetch(url)
            .then((res) => res.json())
            .then((data) => {
                users = data;
                submitBtn.disabled = false;
                submitBtn.innerText = "Đăng nhập";
            })
            .catch(err => {
                document.getElementById("err").innerText = "Lỗi kết nối mạng, vui lòng thử lại sau.";
            });

        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value;
            const errorMsg = document.getElementById("err");

            errorMsg.innerHTML = ""; // Xóa lỗi cũ

            const foundUser = users.find(
                (u) => u.name === usernameInput && u.password === passwordInput
            );

            if (foundUser) {
                localStorage.setItem("username", foundUser.name);
                localStorage.setItem("userId", foundUser.id);

                if (foundUser.id === 1 || foundUser.id === "1") {
                    window.location.href = "./admin.html";
                } else {
                    window.location.href = "./index.html";
                }
            } else {
                errorMsg.innerHTML = "Sai tài khoản hoặc mật khẩu!";
            }
        });

        // --- XỬ LÝ ẨN/HIỆN MẬT KHẨU ---
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");

        togglePassword.addEventListener("click", function () {
            // 1. Chuyển đổi loại input giữa 'password' và 'text'
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);

            // 2. Thay đổi icon con mắt
            const icon = this.querySelector("i");
            icon.classList.toggle("fa-eye");       // Mắt mở
            icon.classList.toggle("fa-eye-slash"); // Mắt nhắm có gạch chéo
        });
    </script>
</body>

</html>
