<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Guitar Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--dark);
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            font-size: 14px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        /* Form Styling */
        .card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .full-width { grid-column: span 2; }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #64748b;
        }

        input {
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-group {
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-update { background: var(--warning); color: white; display: none; }
        
        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        th {
            background: #f1f5f9;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        tr:hover { background-color: #f8fafc; }

        .preview {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .price-tag {
            color: var(--success);
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit { background: #e0f2fe; color: #0369a1; font-size: 12px; }
        .btn-delete { background: #fee2e2; color: #b91c1c; font-size: 12px; }

    </style>
</head>
<body>

    <div class="container">
        <h1>
            Quản lý Guitar
            <a href="index.html" class="back-link">← Về trang chủ</a>
        </h1>

        <div class="card">
            <form id="GuiForm">
                <input type="hidden" id="GuiId">
                <div class="grid-form">
                    <div class="form-group">
                        <label>Tên sản phẩm</label>
                        <input type="text" id="GuiName"required>
                    </div>
                    <div class="form-group">
                        <label>Hãng sản xuất</label>
                        <input type="text" id="GuiBrand"required>
                    </div>
                    <div class="form-group">
                        <label>Giá niêm yết ($)</label>
                        <input type="number" id="GuiPri"required>
                    </div>
                    <div class="form-group">
                        <label>Link hình ảnh (URL)</label>
                        <input type="text" id="GuiImg"required>
                    </div>
                    <div class="form-group">
                        <label>Kiểu</label>
                        <input type="text" id="GuiType"required>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" id="btnAdd" class="btn-add">Thêm sản phẩm mới</button>
                    <button type="button" id="btnUpdate" class="btn-update">Cập nhật thay đổi</button>
                </div>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Hãng</th>
                    <th>Kiểu</th>
                    <th>Giá</th>
                    <th style="text-align: center;">Thao tác</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script src="./admin.js"></script>
</body>
</html>
